name: Misspell Check

on:
  pull_request:
    branches:
      - main

jobs:
  misspell:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install misspell
        run: |
          curl -L https://github.com/client9/misspell/releases/latest/download/misspell_linux_amd64.tar.gz \
            | tar xz
          sudo mv misspell /usr/local/bin/

      - name: Run misspell
        run: |
          misspell -error .
